name: Automated Testing

on:
  push:

permissions:
  contents: read

jobs:
  composer:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php-version: '7.4'
            lock-version: '3.4'
          - php-version: '7.4'
            lock-version: '4.4'
          - php-version: '8.0'
            lock-version: '5.0'
          - php-version: '8.1'
            lock-version: '6.0'
          - php-version: '8.2'
            lock-version: '7.0'

    steps:
      - uses: "shivammathur/setup-php@v2"
        with:
          php-version: "${{ matrix.php-version }}"
          tools: composer

      - uses: actions/checkout@v4

      - name: Set versions
        run: cp composer.${{ matrix.lock-version }}.lock composer.lock

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

  composer-require-checker:
    name: Check composer requirements
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-php
      - run: cp composer.7.0.lock composer.lock
      - uses: ./.github/actions/setup-composer
      - uses: ./.github/actions/setup-phive

      - name: Check composer requirements
        run: composer require-check

  composer-unused:
    name: Check unused composer requirements
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-php
      - run: cp composer.7.0.lock composer.lock
      - uses: ./.github/actions/setup-composer
      - uses: ./.github/actions/setup-phive

      - name: Check unused composer requirements
        run: composer unused

  phpunit:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php-version: '7.4'
            lock-version: '3.4'
          - php-version: '7.4'
            lock-version: '4.4'
          - php-version: '8.0'
            lock-version: '5.0'
          - php-version: '8.1'
            lock-version: '6.0'
          - php-version: '8.2'
            lock-version: '7.0'

    steps:
      - uses: "shivammathur/setup-php@v2"
        with:
          php-version: "${{ matrix.php-version }}"
          tools: composer

      - uses: actions/checkout@v4

      - name: Set versions
        run: cp composer.${{ matrix.lock-version }}.lock composer.lock

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: Run test suite
        run: composer run-script phpunit

  php-cs-check:
    name: 'PHP CS Fixer: check'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-php
      - uses: ./.github/actions/setup-composer
      - uses: ./.github/actions/setup-phive

      - name: 'Run PHP CS Fixer: check'
        run: composer run cs-fixer-check

  phpstan:
    runs-on: ubuntu-latest
    steps:
      - uses: "shivammathur/setup-php@v2"
        with:
          php-version: 8.2
          tools: composer

      - uses: actions/checkout@v4

      - name: Set versions
        run: cp composer.6.0.lock composer.lock

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: PHPStan analyse
        run: composer run-script phpstan-analise
